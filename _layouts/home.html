---
layout: default
---
<header class="user-header">
  <div class="container user-profile">
    <div class="avatar-wrap">
      <img class="user-avatar" src="{{ site.profile.avatar }}" alt="{{ site.profile.name }} avatar" referrerpolicy="no-referrer">
    </div>
    <div class="user-main">
      <div class="user-upper">
        <h1>{{ site.profile.name }}</h1>
        <a class="icon-button" href="{{ '/feed.xml' | relative_url }}" aria-label="RSS feed">RSS</a>
      </div>
      <p>{{ site.profile.bio }}</p>
    </div>
  </div>
</header>

<div class="container tabs-container">
  <nav class="tabs" aria-label="Profile sections">
    <a aria-selected="true" href="{{ '/' | relative_url }}">Articles<span>{{ site.posts | size }}</span></a>
    <a aria-selected="false" href="#">Scraps<span>0</span></a>
    <a aria-selected="false" href="#">Comments</a>
  </nav>
</div>

<section class="contents">
  <div class="container">
    <div class="post-grid-list" id="articles">
      {% for post in site.posts %}
        {% include post-card.html post=post %}
      {% else %}
        <div class="empty-state">
          <p>No articles yet.</p>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
