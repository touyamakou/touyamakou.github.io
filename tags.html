---
layout: page
title: Tags
permalink: /tags/
---

<div class="tag-index">
  {% assign tags = site.tags | sort %}
  {% for tag in tags %}
    <section id="{{ tag[0] | slugify }}" class="tag-section">
      <h2>#{{ tag[0] }}</h2>
      <ul>
        {% for post in tag[1] %}
          <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a><span>{{ post.date | date: "%Y.%m.%d" }}</span></li>
        {% endfor %}
      </ul>
    </section>
  {% endfor %}
</div>
