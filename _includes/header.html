{% assign brand_url = site.brand.url | default: '/' %}
<header class="topbar">
  <div class="wide-container topbar-inner">
    <a class="zenn-logo" href="{{ brand_url | relative_url }}" aria-label="{{ site.brand.title | default: site.title }} home">
      <span class="zenn-mark">
        {% if site.brand.icon_image and site.brand.icon_image != '' %}
          <img src="{{ site.brand.icon_image | relative_url }}" alt="" aria-hidden="true">
        {% else %}
          {{ site.brand.icon_text | default: 'Z' }}
        {% endif %}
      </span>
      <span class="zenn-word">{{ site.brand.title | default: site.title }}</span>
    </a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </div>
</header>
